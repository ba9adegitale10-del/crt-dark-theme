<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Nouveau don','donations')}">
<section id="pg">
  <div class="ph">
    <div><h2 class="ph-title" th:text="${donation.id!=null?'Modifier don':'Enregistrer un don'}">Don</h2></div>
    <a href="/donations" class="btn btn-secondary">← Retour</a>
  </div>
  <div class="form-wrap">
    <form th:action="@{/donations/save}" method="post">
      <input type="hidden" name="id" th:value="${donation.id}"/>
      <div class="form-grid">
        <div class="form-group"><label>Nom du donateur</label><input type="text" name="donorName" class="finput" th:value="${donation.donorName}" placeholder="Nom ou Anonyme"/></div>
        <div class="form-group"><label>Email donateur</label><input type="email" name="donorEmail" class="finput" th:value="${donation.donorEmail}"/></div>
        <div class="form-group"><label>Téléphone donateur</label><input type="text" name="donorPhone" class="finput" th:value="${donation.donorPhone}"/></div>
        <div class="form-group"><label>Montant (TND)</label><input type="number" name="amount" class="finput" th:value="${donation.amount}" step="0.001" min="0" placeholder="0.000"/></div>
        <div class="form-group"><label>Type de don</label>
          <select name="type" class="finput">
            <option value="MONETARY" th:selected="${donation.type==null or donation.type.name()=='MONETARY'}">💰 Monétaire</option>
            <option value="FOOD" th:selected="${donation.type!=null and donation.type.name()=='FOOD'}">🥫 Alimentaire</option>
            <option value="CLOTHES" th:selected="${donation.type!=null and donation.type.name()=='CLOTHES'}">👕 Vêtements</option>
            <option value="MEDICAL" th:selected="${donation.type!=null and donation.type.name()=='MEDICAL'}">💊 Médical</option>
            <option value="OTHER" th:selected="${donation.type!=null and donation.type.name()=='OTHER'}">Autre</option>
          </select>
        </div>
        <div class="form-group"><label>Statut</label>
          <select name="status" class="finput">
            <option value="RECEIVED" th:selected="${donation.status==null or donation.status.name()=='RECEIVED'}">✅ Reçu</option>
            <option value="PENDING" th:selected="${donation.status!=null and donation.status.name()=='PENDING'}">⏳ En attente</option>
            <option value="DISTRIBUTED" th:selected="${donation.status!=null and donation.status.name()=='DISTRIBUTED'}">📦 Distribué</option>
          </select>
        </div>
        <div class="form-group"><label>Date du don</label><input type="date" name="donationDate" class="finput" th:value="${donation.donationDate}"/></div>
      </div>
      <div class="form-group" style="margin-top:12px;"><label>Description</label><textarea name="description" class="finput" rows="3" th:text="${donation.description}"></textarea></div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-actions">
        <a href="/donations" class="btn btn-secondary">Annuler</a>
        <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
      </div>
    </form>
  </div>
</section>
</div>
</body>
</html>
