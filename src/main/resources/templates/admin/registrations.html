<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Demandes inscription','registrations')}">
<section id="pg">
  <div th:if="${success}" class="flash flash-ok">✓ <span th:text="${success}"></span></div>
  <div th:if="${error}"   class="flash flash-err">✗ <span th:text="${error}"></span></div>
  <div class="ph">
    <div><h2 class="ph-title">Demandes d'inscription</h2><p class="ph-sub">Validez ou refusez les nouvelles demandes d'accès</p></div>
  </div>
  <div class="cat-pills">
    <a href="/admin/registrations" class="cat-pill active">Toutes</a>
    <a href="/admin/registrations?status=PENDING" class="cat-pill">⏳ En attente</a>
    <a href="/admin/registrations?status=ACTIVE" class="cat-pill">✅ Approuvées</a>
    <a href="/admin/registrations?status=REJECTED" class="cat-pill">❌ Refusées</a>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr><th>Demandeur</th><th>Rôle souhaité</th><th>Date demande</th><th>Message</th><th>Statut</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:if="${registrations==null or registrations.empty}">
          <td colspan="6"><div class="empty"><div class="empty-ico">📋</div><div class="empty-title">Aucune demande</div></div></td>
        </tr>
        <tr th:each="u : ${registrations}">
          <td>
            <div class="cell-name" th:text="${u.fullName?:u.username}">Nom</div>
            <div class="cell-sub" th:text="'@'+u.username">@user</div>
            <div class="cell-sub" th:text="${u.email?:''}"></div>
          </td>
          <td><span class="badge b-blue" th:text="${u.role}">ROLE</span></td>
          <td style="font-size:12px;color:var(--text-3);" th:text="${u.registeredAt!=null?#temporals.format(u.registeredAt,'dd/MM/yyyy HH:mm'):'—'}">Date</td>
          <td style="font-size:12px;max-width:200px;" th:text="${u.registrationNote?:'—'}">Message</td>
          <td>
            <span class="badge"
              th:classappend="${u.accountStatus!=null and u.accountStatus.name()=='PENDING'}?'b-amber':(${u.accountStatus!=null and u.accountStatus.name()=='ACTIVE'}?'b-green':'b-red')"
              th:text="${u.accountStatus?:'-'}">Statut</span>
          </td>
          <td>
            <div class="actions">
              <form th:action="@{/admin/registrations/approve/{id}(id=${u.id})}" method="post" style="display:inline;" th:if="${u.accountStatus!=null and u.accountStatus.name()=='PENDING'}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-success btn-sm" title="Approuver">✅</button>
              </form>
              <form th:action="@{/admin/registrations/reject/{id}(id=${u.id})}" method="post" style="display:inline;" th:if="${u.accountStatus!=null and u.accountStatus.name()=='PENDING'}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger btn-sm" title="Refuser">❌</button>
              </form>
              <a th:href="@{/users/delete/{id}(id=${u.id})}" class="btn btn-danger btn-sm btn-icon" onclick="return confirm('Supprimer ?')">🗑️</a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</div>
</body>
</html>
