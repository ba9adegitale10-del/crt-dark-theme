<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRT Mégrine — Inscription</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="login-page" style="padding:40px 16px;">
  <div class="login-card" style="max-width:520px;">
    <div class="login-logo"><img th:src="@{/images/logo-crt.png}" alt="CRT"/></div>
    <div class="login-title">Demande d'accès</div>
    <div class="login-sub">Remplissez ce formulaire — un admin validera votre compte</div>

    <div th:if="${success}" class="flash flash-ok">✓ <span th:text="${success}"></span></div>
    <div th:if="${error}"   class="flash flash-err">❌ <span th:text="${error}"></span></div>

    <form th:action="@{/register}" method="post" style="display:flex;flex-direction:column;gap:14px;margin-top:20px;">
      <div class="form-grid">
        <div class="form-group">
          <label>Nom complet *</label>
          <input type="text" name="fullName" class="finput" placeholder="Ahmed Ben Ali" required/>
        </div>
        <div class="form-group">
          <label>Nom d'utilisateur *</label>
          <input type="text" name="username" class="finput" placeholder="ahmed.benali" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="finput" placeholder="ahmed@email.com"/>
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="text" name="phone" class="finput" placeholder="+216 20 000 000"/>
      </div>
      <div class="form-group">
        <label>Mot de passe *</label>
        <input type="password" name="password" class="finput" placeholder="••••••••" required minlength="6"/>
      </div>
      <div class="form-group">
        <label>Message / Motivation</label>
        <textarea name="note" class="finput" rows="3" placeholder="Pourquoi souhaitez-vous rejoindre CRT Mégrine ?"></textarea>
      </div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary" style="width:100%;min-height:46px;">Envoyer la demande →</button>
    </form>

    <div style="text-align:center;margin-top:16px;">
      <a href="/login" style="font-size:12px;color:var(--text-3);text-decoration:none;">
        ← Retour à la connexion
      </a>
    </div>
  </div>
</div>
</body>
</html>
