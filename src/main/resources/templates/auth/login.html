<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#080810"/>
  <title>CRT Mégrine — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img th:src="@{/images/logo-crt.png}" alt="CRT"/>
    </div>
    <div class="login-title">Croissant-Rouge Tunisien</div>
    <div class="login-sub">Délégation de Mégrine — Espace de gestion</div>

    <div th:if="${param.error}" class="flash flash-err">❌ Identifiants incorrects. Réessayez.</div>
    <div th:if="${param.logout}" class="flash flash-ok">✓ Déconnecté avec succès.</div>

    <form th:action="@{/login}" method="post" style="display:flex;flex-direction:column;gap:14px;">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" name="username" class="finput" placeholder="admin" required autofocus/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" class="finput" placeholder="••••••••" required/>
      </div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px;min-height:46px;font-size:14px;">
        Se connecter →
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);">
      <a href="/register" style="font-size:12px;color:var(--text-3);text-decoration:none;transition:var(--transition);">
        Pas encore de compte ? <span style="color:var(--red-2);font-weight:600;">Demander l'accès</span>
      </a>
    </div>
  </div>
</div>
</body>
</html>
