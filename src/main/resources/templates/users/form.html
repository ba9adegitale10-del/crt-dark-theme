<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Utilisateur','users')}">
<section id="pg">
  <div class="ph">
    <div><h2 class="ph-title" th:text="${user.id!=null?'Modifier utilisateur':'Nouvel utilisateur'}">Utilisateur</h2></div>
    <a href="/users" class="btn btn-secondary">← Retour</a>
  </div>
  <div class="form-wrap">
    <form th:action="@{/users/save}" method="post">
      <input type="hidden" name="id" th:value="${user.id}"/>
      <div class="form-grid">
        <div class="form-group"><label>Nom d'utilisateur *</label><input type="text" name="username" class="finput" th:value="${user.username}" required/></div>
        <div class="form-group"><label>Nom complet</label><input type="text" name="fullName" class="finput" th:value="${user.fullName}"/></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" class="finput" th:value="${user.email}"/></div>
        <div class="form-group"><label>Mot de passe <span th:if="${user.id!=null}" style="color:var(--text-3);font-size:10px;">(laisser vide = inchangé)</span></label>
          <input type="password" name="password" class="finput" th:required="${user.id==null}" placeholder="••••••••"/>
        </div>
        <div class="form-group"><label>Rôle</label>
          <select name="role" class="finput" id="roleSelect" onchange="updatePerms(this.value)">
            <option value="ROLE_ADMIN" th:selected="${user.role=='ROLE_ADMIN'}">🔴 Administrateur</option>
            <option value="ROLE_USER" th:selected="${user.role=='ROLE_USER' or user.role==null}">🔵 Utilisateur</option>
            <option value="ROLE_MEMBER" th:selected="${user.role=='ROLE_MEMBER'}">🟢 Membre bénévole</option>
          </select>
        </div>
        <div class="form-group"><label>Statut</label>
          <div class="check-group">
            <label class="check-item"><input type="radio" name="enabled" value="true" th:checked="${user.enabled or user.id==null}"/> ✅ Actif</label>
            <label class="check-item"><input type="radio" name="enabled" value="false" th:checked="${!user.enabled and user.id!=null}"/> ⏸ Inactif</label>
          </div>
        </div>
      </div>
      <div id="permSection" style="margin-top:16px;">
        <div class="form-group">
          <label>Permissions d'accès <span style="font-size:10px;color:var(--text-3);">(vide = accès complet selon le rôle)</span></label>
          <div class="check-group">
            <label class="check-item"><input type="checkbox" name="permissions" value="VOLUNTEERS" th:checked="${selectedPerms!=null and selectedPerms.contains('VOLUNTEERS')}"/> 👥 Bénévoles</label>
            <label class="check-item"><input type="checkbox" name="permissions" value="FAMILIES" th:checked="${selectedPerms!=null and selectedPerms.contains('FAMILIES')}"/> 🏠 Familles</label>
            <label class="check-item"><input type="checkbox" name="permissions" value="DONATIONS" th:checked="${selectedPerms!=null and selectedPerms.contains('DONATIONS')}"/> ❤️ Dons</label>
            <label class="check-item"><input type="checkbox" name="permissions" value="STOCK" th:checked="${selectedPerms!=null and selectedPerms.contains('STOCK')}"/> 📦 Stock</label>
            <label class="check-item"><input type="checkbox" name="permissions" value="EVENTS" th:checked="${selectedPerms!=null and selectedPerms.contains('EVENTS')}"/> 📅 Événements</label>
            <label class="check-item"><input type="checkbox" name="permissions" value="TRAINING" th:checked="${selectedPerms!=null and selectedPerms.contains('TRAINING')}"/> 📚 Formations</label>
            <label class="check-item"><input type="checkbox" name="permissions" value="MEMBER" th:checked="${selectedPerms!=null and selectedPerms.contains('MEMBER')}"/> 👤 Mon Espace</label>
          </div>
        </div>
      </div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-actions">
        <a href="/users" class="btn btn-secondary">Annuler</a>
        <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
      </div>
    </form>
  </div>
</section>
</div>
<script>
function updatePerms(role){
  document.getElementById('permSection').style.opacity = role==='ROLE_ADMIN'?'0.3':'1';
  document.getElementById('permSection').style.pointerEvents = role==='ROLE_ADMIN'?'none':'auto';
}
updatePerms(document.getElementById('roleSelect').value);
</script>
</body>
</html>
