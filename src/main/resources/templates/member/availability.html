<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Disponibilités','member')}">
<section id="pg">
  <div class="ph"><div><h2 class="ph-title">Mes disponibilités</h2></div><a href="/member" class="btn btn-secondary">← Retour</a></div>
  <div class="form-wrap" style="max-width:500px;">
    <form th:action="@{/member/availability}" method="post">
      <p style="font-size:13px;color:var(--text-2);margin-bottom:20px;">Indiquez vos créneaux de disponibilité pour les missions et événements.</p>
      <div class="form-group">
        <label>Créneaux disponibles</label>
        <div class="check-group">
          <label class="check-item"><input type="checkbox" name="availability" value="MATIN" th:checked="${volunteer!=null and volunteer.availability!=null and volunteer.availability.contains('MATIN')}"/> 🌅 Matin</label>
          <label class="check-item"><input type="checkbox" name="availability" value="APRES-MIDI" th:checked="${volunteer!=null and volunteer.availability!=null and volunteer.availability.contains('APRES-MIDI')}"/> ☀️ Après-midi</label>
          <label class="check-item"><input type="checkbox" name="availability" value="SOIREE" th:checked="${volunteer!=null and volunteer.availability!=null and volunteer.availability.contains('SOIREE')}"/> 🌙 Soirée</label>
          <label class="check-item"><input type="checkbox" name="availability" value="SAMEDI" th:checked="${volunteer!=null and volunteer.availability!=null and volunteer.availability.contains('SAMEDI')}"/> 📅 Samedi</label>
          <label class="check-item"><input type="checkbox" name="availability" value="DIMANCHE" th:checked="${volunteer!=null and volunteer.availability!=null and volunteer.availability.contains('DIMANCHE')}"/> 📅 Dimanche</label>
          <label class="check-item"><input type="checkbox" name="availability" value="WEEKEND" th:checked="${volunteer!=null and volunteer.availability!=null and volunteer.availability.contains('WEEKEND')}"/> 🗓️ Week-end complet</label>
        </div>
      </div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-actions"><a href="/member" class="btn btn-secondary">Annuler</a><button type="submit" class="btn btn-primary">💾 Sauvegarder</button></div>
    </form>
  </div>
</section>
</div>
</body>
</html>
