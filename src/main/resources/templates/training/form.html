<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Formations','training')}">
<section id="pg">
  <div class="ph"><div><h2 class="ph-title">Nouvelle ressource</h2></div><a href="/training" class="btn btn-secondary">← Retour</a></div>
  <div class="form-wrap">
    <form th:action="@{/training/save}" method="post">
      <div class="form-grid">
        <div class="form-group" style="grid-column:1/-1;"><label>Titre *</label><input type="text" name="title" class="finput" th:value="${resource.title}" required/></div>
        <div class="form-group"><label>Type</label>
          <select name="resourceType" class="finput">
            <option value="PDF">📄 PDF</option><option value="VIDEO">🎥 Vidéo</option><option value="LINK">🔗 Lien</option><option value="DOCUMENT">📑 Document</option>
          </select>
        </div>
        <div class="form-group"><label>Catégorie</label>
          <select name="category" class="finput">
            <option value="PREMIERS_SECOURS">🚑 Premiers secours</option>
            <option value="PROTOCOLE">📋 Protocole</option>
            <option value="FORMATION">📚 Formation</option>
            <option value="AUTRE">Autre</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1;"><label>URL / Lien</label><input type="url" name="url" class="finput" th:value="${resource.url}" placeholder="https://..."/></div>
      </div>
      <div class="form-group" style="margin-top:12px;"><label>Description</label><textarea name="description" class="finput" rows="4" th:text="${resource.description}"></textarea></div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-actions"><a href="/training" class="btn btn-secondary">Annuler</a><button type="submit" class="btn btn-primary">💾 Enregistrer</button></div>
    </form>
  </div>
</section>
</div>
</body>
</html>
