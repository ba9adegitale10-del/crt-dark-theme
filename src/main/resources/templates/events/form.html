<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Événement','events')}">
<section id="pg">
  <div class="ph">
    <div><h2 class="ph-title" th:text="${event.id!=null?'Modifier événement':'Nouvel événement'}">Événement</h2></div>
    <a href="/events" class="btn btn-secondary">← Retour</a>
  </div>
  <div class="form-wrap">
    <form th:action="@{/events/save}" method="post">
      <input type="hidden" name="id" th:value="${event.id}"/>
      <div class="form-grid">
        <div class="form-group" style="grid-column:1/-1;"><label>Titre *</label><input type="text" name="title" class="finput" th:value="${event.title}" required/></div>
        <div class="form-group"><label>Date de l'événement *</label><input type="date" name="eventDate" class="finput" th:value="${event.eventDate}" required/></div>
        <div class="form-group"><label>Heure</label><input type="time" name="eventTime" class="finput" th:value="${event.eventTime}"/></div>
        <div class="form-group"><label>Lieu</label><input type="text" name="location" class="finput" th:value="${event.location}"/></div>
        <div class="form-group"><label>Responsable</label><input type="text" name="responsibleName" class="finput" th:value="${event.responsibleName}"/></div>
        <div class="form-group"><label>Capacité max.</label><input type="number" name="maxParticipants" class="finput" th:value="${event.maxParticipants}" min="0"/></div>
        <div class="form-group"><label>Statut</label>
          <select name="status" class="finput">
            <option value="PLANNED" th:selected="${event.status==null or event.status.name()=='PLANNED'}">📅 Planifié</option>
            <option value="ONGOING" th:selected="${event.status!=null and event.status.name()=='ONGOING'}">🟢 En cours</option>
            <option value="COMPLETED" th:selected="${event.status!=null and event.status.name()=='COMPLETED'}">✅ Terminé</option>
            <option value="CANCELLED" th:selected="${event.status!=null and event.status.name()=='CANCELLED'}">❌ Annulé</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px;"><label>Description</label><textarea name="description" class="finput" rows="4" th:text="${event.description}"></textarea></div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-actions">
        <a href="/events" class="btn btn-secondary">Annuler</a>
        <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
      </div>
    </form>
  </div>
</section>
</div>
</body>
</html>
