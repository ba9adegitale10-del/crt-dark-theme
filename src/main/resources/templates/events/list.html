<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Événements','events')}">
<section id="pg">
  <div th:if="${success}" class="flash flash-ok">✓ <span th:text="${success}"></span></div>
  <div class="ph">
    <div><h2 class="ph-title">Événements</h2></div>
    <a href="/events/new" class="btn btn-primary">+ Nouvel événement</a>
  </div>
  <div class="cat-pills">
    <a href="/events" class="cat-pill active">Tous</a>
    <a href="/events?status=PLANNED" class="cat-pill">📅 Planifiés</a>
    <a href="/events?status=ONGOING" class="cat-pill">🟢 En cours</a>
    <a href="/events?status=COMPLETED" class="cat-pill">✅ Terminés</a>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;">
    <div th:if="${events==null or events.empty}">
      <div class="card"><div class="empty"><div class="empty-ico">📅</div><div class="empty-title">Aucun événement</div></div></div>
    </div>
    <div th:each="ev : ${events}" class="card" style="display:flex;gap:16px;align-items:flex-start;">
      <div style="min-width:54px;width:54px;border-radius:var(--radius-xs);background:var(--red-pale);border:1px solid rgba(232,25,44,0.2);text-align:center;padding:8px 4px;">
        <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--red-2);line-height:1;" th:text="${ev.eventDate!=null?#temporals.day(ev.eventDate):'?'}">1</div>
        <div style="font-size:9px;text-transform:uppercase;color:var(--text-3);margin-top:2px;letter-spacing:.06em;" th:text="${ev.eventDate!=null?#temporals.monthName(ev.eventDate).substring(0,3):'?'}">Jan</div>
      </div>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div class="cell-name" style="font-size:15px;" th:text="${ev.title}">Titre</div>
          <span class="badge"
            th:classappend="${ev.status!=null and ev.status.name()=='UPCOMING'}?'b-blue':(${ev.status!=null and ev.status.name()=='ONGOING'}?'b-green':'b-gray')"
            th:text="${ev.status!=null?(ev.status.name()=='UPCOMING'?'Planifié':(ev.status.name()=='ONGOING'?'En cours':'Terminé')):'?'}">S</span>
        </div>
        <div class="cell-sub" style="margin-top:4px;" th:text="${ev.location!=null?'📍 '+ev.location:''}"></div>
        <div class="cell-sub" th:text="${ev.responsibleName!=null?'👤 Resp: '+ev.responsibleName:''}"></div>
        <div style="font-size:12px;color:var(--text-3);margin-top:6px;" th:text="${ev.description!=null?ev.description.length()>100?ev.description.substring(0,100)+'...':ev.description:''}"></div>
      </div>
      <div class="actions" style="flex-shrink:0;">
        <a th:href="@{/events/edit/{id}(id=${ev.id})}" class="btn btn-secondary btn-sm btn-icon">✏️</a>
        <a th:href="@{/events/delete/{id}(id=${ev.id})}" class="btn btn-danger btn-sm btn-icon" onclick="return confirm('Supprimer ?')">🗑️</a>
      </div>
    </div>
  </div>
</section>
</div>
</body>
</html>
