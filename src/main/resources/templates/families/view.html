<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Fiche Famille','families')}">
<section id="pg">
  <div class="ph">
    <div><h2 class="ph-title" th:text="${family.headName}">Famille</h2><p class="ph-sub">Fiche détaillée</p></div>
    <div class="actions">
      <a th:href="@{/families/edit/{id}(id=${family.id})}" class="btn btn-secondary">✏️ Modifier</a>
      <a href="/families" class="btn btn-secondary">← Retour</a>
    </div>
  </div>
  <div class="two-col">
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="card">
        <div class="card-head"><div class="card-title">📋 Informations générales</div></div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
            <span style="font-size:12px;color:var(--text-3);">Chef de famille</span>
            <span style="font-size:13px;font-weight:600;" th:text="${family.headName}">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
            <span style="font-size:12px;color:var(--text-3);">Téléphone</span>
            <span style="font-size:13px;" th:text="${family.phone?:'—'}">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
            <span style="font-size:12px;color:var(--text-3);">Adresse</span>
            <span style="font-size:13px;" th:text="${family.address?:'—'}">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
            <span style="font-size:12px;color:var(--text-3);">Membres</span>
            <span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;" th:text="${family.membersCount?:0}">0</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;">
            <span style="font-size:12px;color:var(--text-3);">Statut</span>
            <span class="badge" th:classappend="${family.status!=null and family.status.name()=='ACTIVE'}?'b-green':'b-gray'" th:text="${family.status}">—</span>
          </div>
        </div>
      </div>
      <div class="card" th:if="${family.notes!=null and !family.notes.isEmpty()}">
        <div class="card-head"><div class="card-title">📝 Notes</div></div>
        <p style="font-size:13px;color:var(--text-2);line-height:1.6;" th:text="${family.notes}"></p>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="card">
        <div class="card-head"><div class="card-title">❤️ Aides reçues</div><a th:href="@{/donations/new?familyId={id}(id=${family.id})}" class="btn btn-primary btn-sm">+ Aide</a></div>
        <div th:if="${aids==null or aids.empty}"><div class="empty" style="padding:20px;"><div class="empty-ico">❤️</div><div class="empty-title">Aucune aide enregistrée</div></div></div>
        <div th:each="a : ${aids}" style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div><div class="cell-name" style="font-size:12px;" th:text="${a.aidType}">Type</div><div class="cell-sub" th:text="${a.description?:'—'}">Desc</div></div>
            <div th:if="${a.amount!=null}" style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--green);" th:text="${a.amount}+' TND'">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</div>
</body>
</html>
