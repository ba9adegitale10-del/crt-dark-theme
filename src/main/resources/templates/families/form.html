<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Famille','families')}">
<section id="pg">
  <div class="ph">
    <div><h2 class="ph-title" th:text="${family.id!=null?'Modifier famille':'Nouvelle famille'}">Famille</h2></div>
    <a href="/families" class="btn btn-secondary">← Retour</a>
  </div>
  <div class="form-wrap">
    <form th:action="@{/families/save}" method="post">
      <input type="hidden" name="id" th:value="${family.id}"/>
      <div class="form-grid">
        <div class="form-group"><label>Chef de famille *</label><input type="text" name="headName" class="finput" th:value="${family.headName}" required/></div>
        <div class="form-group"><label>Téléphone</label><input type="text" name="phone" class="finput" th:value="${family.phone}"/></div>
        <div class="form-group"><label>Adresse</label><input type="text" name="address" class="finput" th:value="${family.address}"/></div>
        <div class="form-group"><label>CIN</label><input type="text" name="cin" class="finput" th:value="${family.cin}"/></div>
        <div class="form-group"><label>Nombre de membres</label><input type="number" name="membersCount" class="finput" th:value="${family.membersCount?:1}" min="1"/></div>
        <div class="form-group"><label>Situation familiale</label><input type="text" name="familySituation" class="finput" th:value="${family.familySituation}" placeholder="Ex: Veuf, Divorcé..."/></div>
        <div class="form-group"><label>Catégorie</label>
          <select name="category" class="finput">
            <option value="NEEDY" th:selected="${family.category!=null and family.category.name()=='NEEDY'}">🔴 Nécessiteuse</option>
            <option value="ORPHAN" th:selected="${family.category!=null and family.category.name()=='ORPHAN'}">💙 Orphelins</option>
            <option value="DISABLED" th:selected="${family.category!=null and family.category.name()=='DISABLED'}">♿ Handicap</option>
            <option value="ELDERLY" th:selected="${family.category!=null and family.category.name()=='ELDERLY'}">👴 Personne âgée</option>
            <option value="OTHER" th:selected="${family.category!=null and family.category.name()=='OTHER'}">Autre</option>
          </select>
        </div>
        <div class="form-group"><label>Statut</label>
          <select name="status" class="finput">
            <option value="ACTIVE" th:selected="${family.status==null or family.status.name()=='ACTIVE'}">✅ Active</option>
            <option value="INACTIVE" th:selected="${family.status!=null and family.status.name()=='INACTIVE'}">⏸ Inactive</option>
          </select>
        </div>
        <div class="form-group"><label>Date d'enregistrement</label><input type="date" name="registrationDate" class="finput" th:value="${family.registrationDate}"/></div>
      </div>
      <div class="form-group" style="margin-top:12px;"><label>Notes</label><textarea name="notes" class="finput" rows="3" th:text="${family.notes}"></textarea></div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-actions">
        <a href="/families" class="btn btn-secondary">Annuler</a>
        <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
      </div>
    </form>
  </div>
</section>
</div>
</body>
</html>
