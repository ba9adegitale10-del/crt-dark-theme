<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Gestion de Stock','stock')}">
<section id="pg">
  <div th:if="${success}" class="flash flash-ok">✓ <span th:text="${success}"></span></div>
  <div th:if="${error}"   class="flash flash-err">✗ <span th:text="${error}"></span></div>
  <div class="ph">
    <div><h2 class="ph-title">Gestion de Stock</h2><p class="ph-sub" th:text="${items!=null?items.size()+' articles en stock':''}"></p></div>
    <a href="/stock/new" class="btn btn-primary">+ Nouvel article</a>
  </div>
  <div class="cat-pills">
    <a href="/stock" class="cat-pill active">Tous</a>
    <a href="/stock?cat=FOOD" class="cat-pill">🥫 Alimentaire</a>
    <a href="/stock?cat=CLOTHES" class="cat-pill">👕 Vêtements</a>
    <a href="/stock?cat=MEDICAL" class="cat-pill">💊 Médical</a>
    <a href="/stock?cat=OTHER" class="cat-pill">📦 Autre</a>
    <a href="/stock?low=1" class="cat-pill" style="color:var(--red-2);border-color:rgba(232,25,44,0.3);">⚠️ Stock faible</a>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr><th>Article</th><th>Catégorie</th><th>Quantité</th><th>Seuil min.</th><th>Niveau</th><th>Localisation</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:if="${items==null or items.empty}">
          <td colspan="7"><div class="empty"><div class="empty-ico">📦</div><div class="empty-title">Aucun article en stock</div></div></td>
        </tr>
        <tr th:each="item : ${items}">
          <td>
            <div class="cell-name" th:text="${item.name}">Article</div>
            <div class="cell-sub" th:text="${item.description?:'—'}">Desc</div>
          </td>
          <td>
            <span class="badge"
              th:classappend="${item.categoryEnum!=null and item.categoryEnum.name()=='FOOD'}?'b-amber':(${item.categoryEnum!=null and item.categoryEnum.name()=='MEDICAL'}?'b-red':(${item.categoryEnum!=null and item.categoryEnum.name()=='CLOTHES'}?'b-blue':'b-gray'))"
              th:text="${item.categoryEnum!=null?item.categoryEnum.name():'—'}">Cat</span>
          </td>
          <td>
            <span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;"
                  th:style="${item.quantityMin!=null and item.quantity<=item.quantityMin}?'color:var(--red-2);':'color:var(--text);'"
                  th:text="${item.quantity}">0</span>
            <span style="font-size:11px;color:var(--text-3);" th:text="' '+${item.unit?:''}"></span>
          </td>
          <td style="color:var(--text-3);" th:text="${item.quantityMin?:0}">0</td>
          <td style="min-width:100px;">
            <div th:if="${item.quantityMin!=null and item.quantityMin>0}">
              <div style="background:rgba(255,255,255,0.06);border-radius:99px;height:4px;overflow:hidden;">
                <div th:style="'width:'+${Math.min(item.quantity*100/item.quantityMin,100)}+'%;height:4px;border-radius:99px;background:'+(${item.quantity<=item.quantityMin/2}?'var(--red-2)':(${item.quantity<=item.quantityMin}?'var(--amber)':'var(--green)'))"></div>
              </div>
              <div style="font-size:10px;margin-top:3px;"
                   th:text="${item.quantity<=item.quantityMin/2}?'🔴 Critique':(${item.quantity<=item.quantityMin}?'🟡 Faible':'🟢 OK')"
                   th:style="${item.quantity<=item.quantityMin/2}?'color:var(--red-2);':(${item.quantity<=item.quantityMin}?'color:var(--amber);':'color:var(--green);')"></div>
            </div>
          </td>
          <td style="font-size:12px;color:var(--text-3);" th:text="${item.location?:'—'}">—</td>
          <td>
            <div class="actions">
              <a th:href="@{/stock/edit/{id}(id=${item.id})}" class="btn btn-secondary btn-sm btn-icon">✏️</a>
              <a th:href="@{/stock/delete/{id}(id=${item.id})}" class="btn btn-danger btn-sm btn-icon" onclick="return confirm('Supprimer ?')">🗑️</a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</div>
</body>
</html>
