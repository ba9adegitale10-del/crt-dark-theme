<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Stock','stock')}">
<section id="pg">
  <div class="ph">
    <div><h2 class="ph-title" th:text="${item.id!=null?'Modifier article':'Nouvel article'}">Article</h2></div>
    <a href="/stock" class="btn btn-secondary">← Retour</a>
  </div>
  <div class="form-wrap">
    <form th:action="@{/stock/save}" method="post">
      <input type="hidden" name="id" th:value="${item.id}"/>
      <div class="form-grid">
        <div class="form-group"><label>Nom de l'article *</label><input type="text" name="name" class="finput" th:value="${item.name}" required/></div>
        <div class="form-group"><label>Unité</label><input type="text" name="unit" class="finput" th:value="${item.unit}" placeholder="boite, pièce, kg..."/></div>
        <div class="form-group"><label>Quantité *</label><input type="number" name="quantity" class="finput" th:value="${item.quantity?:0}" min="0" required/></div>
        <div class="form-group"><label>Seuil minimum</label><input type="number" name="quantityMin" class="finput" th:value="${item.quantityMin?:0}" min="0"/></div>
        <div class="form-group"><label>Catégorie</label>
          <select name="categoryEnum" class="finput">
            <option value="FOOD" th:selected="${item.categoryEnum==null or item.categoryEnum.name()=='FOOD'}">🥫 Alimentaire</option>
            <option value="CLOTHES" th:selected="${item.categoryEnum!=null and item.categoryEnum.name()=='CLOTHES'}">👕 Vêtements</option>
            <option value="MEDICAL" th:selected="${item.categoryEnum!=null and item.categoryEnum.name()=='MEDICAL'}">💊 Médical</option>
            <option value="OTHER" th:selected="${item.categoryEnum!=null and item.categoryEnum.name()=='OTHER'}">📦 Autre</option>
          </select>
        </div>
        <div class="form-group"><label>Localisation</label><input type="text" name="location" class="finput" th:value="${item.location}" placeholder="Entrepôt A, Armoire..."/></div>
        <div class="form-group"><label>Date d'entrée</label><input type="date" name="entryDate" class="finput" th:value="${item.entryDate}"/></div>
      </div>
      <div class="form-group" style="margin-top:12px;"><label>Description</label><textarea name="description" class="finput" rows="3" th:text="${item.description}"></textarea></div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-actions">
        <a href="/stock" class="btn btn-secondary">Annuler</a>
        <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
      </div>
    </form>
  </div>
</section>
</div>
</body>
</html>
